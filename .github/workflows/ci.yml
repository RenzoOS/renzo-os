name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax — all agents
        run: |
          python -m py_compile renzo.py
          python -m py_compile agents/chat_agent.py
          python -m py_compile agents/onchain_agent.py
          python -m py_compile agents/social_agent.py
          python -m py_compile agents/research_agent.py
          echo "All files passed syntax check."

      - name: Verify required files exist
        run: |
          test -f README.md && echo "README.md OK"
          test -f LICENSE && echo "LICENSE OK"
          test -f CONTRIBUTING.md && echo "CONTRIBUTING.md OK"
          test -f SECURITY.md && echo "SECURITY.md OK"
          test -f .env.example && echo ".env.example OK"
          test -f requirements.txt && echo "requirements.txt OK"
